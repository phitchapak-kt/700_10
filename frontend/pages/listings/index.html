<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงประกาศ</title>
    <link rel="stylesheet" href="../../assets/css/styles.css">
</head>
<body>

    <nav>
        <a href="../../index.html">หน้าแรก</a>

    </nav>

    <div class="container">
        <div class="page-title">ลงประกาศ</div>
    </div>
    
    <input type="text" id ="title" placeholder="ชื่อสินค้า">
    <input type="text" id ="description" placeholder="รายละเอียด">
    <input type="text" id ="price" placeholder="ราคา">
    <input type="text" id="category_id" placeholder="หมวดหมู่">
    <input type="text" id ="type" placeholder="ประเภท">
    <input type="text" id ="status" placeholder="สถานะ">
    <input type="hidden" id="user_id">
    <button id="button-submit">ลงประกาศ</button>

    <div id="message"></div>
    <div id="listings"></div>
    
    <div id="popup" style="display:none">
            <h3>แก้ไขข้อมูล</h3>
            <input type="text" id="edit-title" placeholder="ชื่อสินค้า">
            <input type="text" id="edit-description" placeholder="รายละเอียด">
            <input type="text" id="edit-price" placeholder="ราคา">
            <input type="text" id="edit-category_id" placeholder="หมวดหมู่">
            <input type="text" id="edit-type" placeholder="ประเภท">
            <input type="text" id="edit-status" placeholder="สถานะ">
            <button id="button-save">บันทึก</button>
            <button id="button-cancel">ยกเลิก</button>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
    <script src="../../js/api.js"></script>
    <script src="./index.js"></script>


</body>
</html>
